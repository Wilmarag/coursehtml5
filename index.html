<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mi App en Azure</title>
</head>
<body>

    <h1>🚀 Hola, estoy en Azure (sin cuota 😎)</h1>
    <p>Deploy exitoso con Static Web Apps</p>

    <hr>

    <h2>Guardar Usuario</h2>

    <input type="text" id="nombre" placeholder="Nombre">
    <br><br>

    <input type="email" id="email" placeholder="Email">
    <br><br>

    <button onclick="guardar()">Guardar</button>

    <script>
        async function guardar() {

            const nombre = document.getElementById("nombre").value;
            const email = document.getElementById("email").value;

            // Validación simple
            if (!nombre || !email) {
                alert("Completa todos los campos");
                return;
            }

            try {

                const response = await fetch('/api/guardarUsuario', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ nombre, email })
                });

                const resultado = await response.text();

                alert(resultado);

            } catch (error) {

                alert("Error conectando con el backend");
                console.error(error);

            }
        }
        <script>

async function listarUsuarios() {

    try {

        const response = await fetch('/api/listarUsuarios');

        const usuarios = await response.json();

        const tbody = document.querySelector("#tablaUsuarios tbody");

        tbody.innerHTML = "";

        usuarios.forEach(usuario => {

            const fila = `
                <tr>
                    <td>${usuario.Id}</td>
                    <td>${usuario.Nombre}</td>
                    <td>${usuario.Email}</td>
                    <td>${usuario.FechaRegistro}</td>
                </tr>
            `;

            tbody.innerHTML += fila;
        });

    } catch (error) {

        console.error(error);
        alert("Error obteniendo usuarios");

    }
}

</script>
    </script>
    <hr>

<h2>Usuarios Registrados</h2>

<button onclick="listarUsuarios()">Ver Usuarios</button>

<br><br>

<table border="1" id="tablaUsuarios">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Fecha</th>
        </tr>
    </thead>
    <tbody>
    </tbody>
</table>

</body>
</html>
